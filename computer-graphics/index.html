<html>
    <head>
        <script id = "fragment-shader" type = "x-shader/x-fragment">
            #version 300 es

            precision mediump float;

            in vec4 vColor;
            out vec4 fColor;

            void main()
            {
                fColor = vColor;
            }
        </script>
        <script id = "vertex-shader" type = "x-shader/x-vertex">
            #version 300 es

            in vec4 aPosition;
            in vec4 aNormal;
            out vec4 vColor;

            uniform vec4 ambientProduct, diffuseProduct, specularProduct;
            uniform mat4 modelViewMatrix;
            uniform mat4 projectionMatrix;
            uniform vec4 lightPosition;
            uniform float shininess;
            uniform mat3 normalMatrix;

            void main()
            {

                vec3 pos = -(modelViewMatrix * aPosition).xyz;
                vec3 light = lightPosition.xyz;
                vec3 L = normalize( light - pos );


                vec3 E = normalize( -pos );
                vec3 H = normalize( L + E );

                // Transform vertex normal into eye coordinates

                vec3 N = normalize( normalMatrix*aNormal.xyz);

                // Compute terms in the illumination equation
                vec4 ambient = ambientProduct;

                float Kd = max( dot(L, N), 0.0 );
                vec4  diffuse = Kd*diffuseProduct;

                float Ks = pow( max(dot(N, H), 0.0), shininess );
                vec4  specular = Ks * specularProduct;

                if( dot(L, N) < 0.0 ) {
                    specular = vec4(0.0, 0.0, 0.0, 1.0);
                }

                gl_Position = projectionMatrix * modelViewMatrix * aPosition;

                vColor = ambient + diffuse + specular;
                vColor.a = 1.0;

            }
        </script>
        <script src = "/js/src/computer-graphics-js/initShader.js"></script>
        <script src = "/js/src/computer-graphics-js/MV.js"></script>
        <script src = "/js/src/computer-graphics-js/vertices.js"></script>
        <script src = "/js/src/computer-graphics-js/patches.js"></script>
        <script src = "/js/src/computer-graphics-js/main.js"></script>
    </head>
    <body>
        <canvas id = "gl-canvas" width = "512" height = "512">
            Your browser does not support the HTML5 canvas element!
        </canvas>
    </body>
</html>
